<section class="header">
    <p-toolbar>
        <div class="logo-container">
            <img src="../../../assets/ayo.png" alt="Logo ayo" routerLink="/"/>
            <p-divider layout="vertical"></p-divider>
            <div class="nav">
                <a *ngFor="let link of links" [routerLink]="link.route || null"
                    (click)="!link.route && scrollPara(link.id)" [class.active]="sessaoAtiva === link.id">
                    {{ link.label }}
                </a>
            </div>
        </div>
        <div class="search-container">
            <div class="search-container" style="position: relative">
                <i class="fa-solid fa-magnifying-glass" style="
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #337ab7;
          "></i>
                <input type="text" placeholder="Busca" style="
            padding-left: 2.5rem;
            height: 2.3rem;
            border-radius: 20px;
            border: none;
            color: #000;
            font-family: 'Exo', sans-serif;
            font-size: 1rem;
          " />
            </div>
        </div>
        <div class="social-container">
            <p-button [ngClass]="{ 'login-active': isLoginRoute }" routerLink="/login">
                <i class="fa-solid fa-circle-user"></i>
                <span class="p-button-label" >Entrar</span>
            </p-button>

            <div class="links">
                <ul>
                    <li>
                        <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    </li>
                    <li>
                        <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                    </li>
                    <li>
                        <a href="#"><i class="fa-brands fa-youtube"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </p-toolbar>
</section>
